# These are generic renderer defaults, not contest or publisher-house presets.
layouts:
  japanese-publisher:
    horizontal:
      pageSize: Shirokuban
      landscape: false
      fontFamily: "Yu Mincho, Hiragino Mincho ProN, Noto Serif JP, serif"
      fontSizePt: 10
      grid: { charactersPerLine: 27, linesPerPage: 26, mode: strict }
      margins: { top: 16.5, bottom: 18, left: 18, right: 15.5 }
      binding: { side: left, marginMode: mirror, gutterMm: 0 }
    vertical:
      pageSize: A4
      landscape: true
      fontFamily: "Yu Mincho, Hiragino Mincho ProN, Noto Serif JP, serif"
      fontSizePt: 10.5
      grid: { charactersPerLine: 40, linesPerPage: 30, mode: strict }
      margins: { top: 30.91666666666667, bottom: 30.91666666666667, left: 28, right: 28 }
      binding: { side: right, marginMode: mirror, gutterMm: 0 }
  word:
    horizontal:
      pageSize: A4
      landscape: false
      fontFamily: "Yu Mincho, Hiragino Mincho ProN, Noto Serif JP, serif"
      fontSizePt: 10.5
      margins: { top: 25.4, bottom: 25.4, left: 25.4, right: 25.4 }
      gridMode: typographic
      binding: { side: left, marginMode: single, gutterMm: 0 }
    vertical:
      pageSize: A4
      landscape: false
      fontFamily: "Yu Mincho, Hiragino Mincho ProN, Noto Serif JP, serif"
      fontSizePt: 10.5
      margins: { top: 25.4, bottom: 25.4, left: 25.4, right: 25.4 }
      gridMode: typographic
      binding: { side: left, marginMode: single, gutterMm: 0 }
