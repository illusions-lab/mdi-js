coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        # New or changed code must meet the recommended coverage target;
        # `auto` instead compares against an unrelated historical PR result.
        target: 95%
        threshold: 0%

flags:
  nodejs:
    paths:
      - nodejs/
  rust:
    paths:
      - mdi-core/
  swift:
    paths:
      - swift/

ignore:
  - nodejs/**/dist/
  - nodejs/docs/
  - python/
