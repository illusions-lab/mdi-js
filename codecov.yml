coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

flags:
  nodejs:
    paths:
      - nodejs/
  rust:
    paths:
      - mdi-core/

ignore:
  - nodejs/**/dist/
  - nodejs/docs/
  - python/
  - swift/
