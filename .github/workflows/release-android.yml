name: Release Android

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# The Android package is a Kotlin/JNI distribution. It is published to GitHub
# Packages with the short-lived GITHUB_TOKEN; it is not a crates.io artifact.
concurrency: release-android-${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  github-packages:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      packages: write
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - name: Verify the manual release commit passed the complete CI gate
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(
            gh api --method GET \
              "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
              -f head_sha="$RELEASE_SHA" \
              -f status=completed \
              -f per_page=100 \
              --jq '[.workflow_runs[] | select(.conclusion == "success")] | length'
          )
          test "$count" -gt 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK and cargo-ndk
        run: |
          sdkmanager --install 'ndk;27.2.12479018'
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          cargo install cargo-ndk --locked

      - name: Publish a new Android version only
        id: version
        shell: bash
        run: |
          version=$(sed -n 's/^VERSION_NAME=//p' android/gradle.properties)
          tag="mdi-android@${version}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null; then
            echo "Android version ${version} is already published; skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, test, and publish to GitHub Packages
        if: steps.version.outputs.publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./android/scripts/build-native.sh
          cd android
          ./scripts/run-gradle.sh :mdi-android:check :mdi-android:publishReleasePublicationToGitHubPackagesRepository

      - name: Tag the published Android artifact
        if: steps.version.outputs.publish == 'true'
        run: |
          git tag "mdi-android@${{ steps.version.outputs.version }}"
          git push origin "mdi-android@${{ steps.version.outputs.version }}"
