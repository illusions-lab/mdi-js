name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  nodejs:
    name: Node.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      # to-pdf's tests print through a real headless Chromium.
      - run: pnpm --filter @illusions-lab/mdi-to-pdf exec playwright install --with-deps chromium
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test:coverage

      - name: Upload Node.js coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./nodejs/**/coverage/lcov.info
          flags: nodejs
          name: nodejs
          fail_ci_if_error: true

  rust-native:
    name: Rust (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux x64
            runner: ubuntu-latest
          - platform: Linux ARM64
            runner: ubuntu-24.04-arm
          - platform: macOS x64
            runner: macos-15-intel
          - platform: macOS ARM64
            runner: macos-15
          - platform: Windows x64
            runner: windows-latest
          - platform: Windows ARM64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: mdi-core
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - run: cargo test

      - if: matrix.platform == 'Linux x64'
        run: cargo fmt --check && cargo clippy -- -D warnings

      - name: Install cargo-llvm-cov
        if: matrix.platform == 'Linux x64'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate Rust coverage report
        if: matrix.platform == 'Linux x64'
        run: cargo llvm-cov --locked --fail-under-lines 90 --lcov --output-path lcov.info

      - name: Upload Rust coverage to Codecov
        if: matrix.platform == 'Linux x64'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./mdi-core/lcov.info
          flags: rust
          name: rust
          fail_ci_if_error: true

  swift:
    name: Swift
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Build the Apple XCFramework
        run: scripts/package-swift-xcframework.sh "$RUNNER_TEMP/mdi-swift"

      - name: Test Swift binding with coverage
        run: |
          mkdir -p swift/Artifacts
          ditto "$RUNNER_TEMP/mdi-swift/MDICore.xcframework" swift/Artifacts/MDICore.xcframework
          scripts/write-swift-package-manifest.sh local "swift/Artifacts/MDICore.xcframework"
          swift test --enable-code-coverage
          scripts/export-swift-coverage.sh swift/coverage.lcov

      - name: Upload Swift coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./swift/coverage.lcov
          flags: swift
          name: swift
          fail_ci_if_error: true

  python:
    name: Python binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the native extension and install test tools
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip maturin
          python -m pip install -e "./python[test]"

      - name: Test Python binding coverage
        run: |
          . .venv/bin/activate
          python -m pytest python/tests --cov=mdi --cov-branch --cov-report=term-missing --cov-report=xml:python/coverage.xml

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./python/coverage.xml
          flags: python
          name: python
          fail_ci_if_error: true
