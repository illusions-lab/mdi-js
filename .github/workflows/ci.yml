name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodejs
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: nodejs/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      # to-pdf's tests print through a real headless Chromium.
      - run: pnpm --filter @illusions-lab/mdi-to-pdf exec playwright install --with-deps chromium
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  rust-native:
    name: Rust (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux x64
            runner: ubuntu-latest
          - platform: Linux ARM64
            runner: ubuntu-24.04-arm
          - platform: macOS x64
            runner: macos-15-intel
          - platform: macOS ARM64
            runner: macos-15
          - platform: Windows x64
            runner: windows-latest
          - platform: Windows ARM64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: mdi-core
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - run: cargo test

      - if: matrix.platform == 'Linux x64'
        run: cargo fmt --check && cargo clippy -- -D warnings
