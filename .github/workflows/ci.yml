name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  nodejs:
    name: Node.js unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      # to-pdf's tests print through a real headless Chromium.
      - run: pnpm --filter @illusions-lab/mdi-to-pdf exec playwright install --with-deps chromium
      - run: pnpm typecheck
      - run: pnpm build
      - run: node --test nodejs/scripts/pack-publishable-package.test.mjs
      - run: pnpm test:coverage

      - name: Upload Node.js coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./nodejs/**/coverage/lcov.info
          flags: nodejs
          name: nodejs
          fail_ci_if_error: true

  rust-native:
    name: Rust (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux x64
            runner: ubuntu-latest
          - platform: Linux ARM64
            runner: ubuntu-24.04-arm
          - platform: macOS x64
            runner: macos-15-intel
          - platform: macOS ARM64
            runner: macos-15
          - platform: Windows x64
            runner: windows-latest
          - platform: Windows ARM64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: mdi-core
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - run: cargo test

      - if: matrix.platform == 'Linux x64'
        run: cargo fmt --check && cargo clippy -- -D warnings

      - name: Install cargo-llvm-cov
        if: matrix.platform == 'Linux x64'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate Rust coverage report
        if: matrix.platform == 'Linux x64'
        run: >-
          cargo llvm-cov --locked
          --fail-under-lines 90
          --fail-under-functions 90
          --fail-under-regions 90
          --lcov --output-path lcov.info

      - name: Upload Rust coverage to Codecov
        if: matrix.platform == 'Linux x64'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./mdi-core/lcov.info
          flags: rust
          name: rust
          fail_ci_if_error: true

  swift:
    name: Swift
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install the official W3C EPUBCheck validator
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/w3c/epubcheck/releases/download/v5.3.0/epubcheck-5.3.0.zip \
            --output "$RUNNER_TEMP/epubcheck.zip"
          ditto -x -k "$RUNNER_TEMP/epubcheck.zip" "$RUNNER_TEMP"

      - name: Build the Apple XCFramework
        run: scripts/package-swift-xcframework.sh "$RUNNER_TEMP/mdi-swift"

      - name: Test Swift binding with coverage
        env:
          MDI_SWIFT_SMOKE_OUTPUT: ${{ runner.temp }}/swift-package-smoke
        run: |
          mkdir -p swift/Artifacts
          ditto "$RUNNER_TEMP/mdi-swift/MDICore.xcframework" swift/Artifacts/MDICore.xcframework
          scripts/write-swift-package-manifest.sh local "swift/Artifacts/MDICore.xcframework"
          swift test --enable-code-coverage
          scripts/export-swift-coverage.sh swift/coverage.lcov

      - name: Open and validate every Swift package format
        run: >-
          scripts/verify-swift-package-formats.sh
          "$RUNNER_TEMP/swift-package-smoke"
          "$RUNNER_TEMP/epubcheck-5.3.0/epubcheck.jar"

      - name: Upload Swift coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./swift/coverage.lcov
          flags: swift
          name: swift
          fail_ci_if_error: true

  python:
    name: Python binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the native extension and install test tools
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip maturin
          python -m pip install -e "./python[test]"

      - name: Test Python binding coverage
        run: |
          . .venv/bin/activate
          python -m pytest python/tests --cov=mdi --cov-branch --cov-report=term-missing --cov-report=xml:python/coverage.xml

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./python/coverage.xml
          flags: python
          name: python
          fail_ci_if_error: true

  android:
    name: Android
    uses: ./.github/workflows/android.yml
    secrets: inherit

  publication-contracts:
    name: Publication contracts
    needs: [nodejs, rust-native, swift, python, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @illusions-lab/mdi-to-pdf exec playwright install --with-deps chromium

      - name: Install LibreOffice DOCX consumer
        run: |
          sudo apt-get update
          sudo apt-get install --yes libreoffice-writer

      - name: Install the official W3C EPUBCheck validator
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/w3c/epubcheck/releases/download/v5.3.0/epubcheck-5.3.0.zip \
            --output "$RUNNER_TEMP/epubcheck.zip"
          unzip -q "$RUNNER_TEMP/epubcheck.zip" -d "$RUNNER_TEMP"
          echo "EPUBCHECK_JAR=$RUNNER_TEMP/epubcheck-5.3.0/epubcheck.jar" >> "$GITHUB_ENV"

      - run: pnpm build
      - run: pnpm test:contracts
