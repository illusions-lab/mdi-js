name: Release Rust

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Publishing here is deliberately limited to the canonical crate. The JNI
# crate is an Android implementation detail (`publish = false`); the other
# ecosystems have their own release workflows.
concurrency: release-rust-${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  crates-io:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      id-token: write
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    defaults:
      run:
        working-directory: mdi-core
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - name: Verify the manual release commit passed the complete CI gate
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(
            gh api --method GET \
              "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
              -f head_sha="$RELEASE_SHA" \
              -f status=completed \
              -f per_page=100 \
              --jq '[.workflow_runs[] | select(.conclusion == "success")] | length'
          )
          test "$count" -gt 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify the crate that will be published
        run: cargo package --locked

      - name: Check whether the manifest version exists
        id: check
        shell: bash
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          status=$(
            curl --silent --show-error --location \
              --user-agent "mdi-release-workflow/1.0" \
              --output /dev/null \
              --write-out '%{http_code}' \
              "https://crates.io/api/v1/crates/mdi-core/${version}"
          )
          case "$status" in
            200)
              echo "mdi-core@${version} is already on crates.io; skipping."
              echo "exists=true" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unexpected crates.io response while checking mdi-core@${version}: HTTP ${status}" >&2
              exit 1
              ;;
          esac
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # crates.io must have this repository configured as a trusted publisher.
      # Exchange GitHub's OIDC token for a short-lived registry token; no
      # long-lived registry token is stored in this workflow.
      - name: Authenticate with crates.io
        if: steps.check.outputs.exists == 'false'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish the manifest version when it is new
        if: steps.check.outputs.exists == 'false'
        id: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish --locked
          echo "version=${{ steps.check.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Tag the published crate
        if: steps.publish.outcome == 'success'
        run: |
          git tag "mdi-core@${{ steps.publish.outputs.version }}"
          git push origin "mdi-core@${{ steps.publish.outputs.version }}"
