name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      id-token: write
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 0

      - name: Verify the manual release commit passed the complete CI gate
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(
            gh api --method GET \
              "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
              -f head_sha="$RELEASE_SHA" \
              -f status=completed \
              -f per_page=100 \
              --jq '[.workflow_runs[] | select(.conclusion == "success")] | length'
          )
          test "$count" -gt 0

      - uses: jetli/wasm-pack-action@v0.4.0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          # npm trusted publishing requires Node >= 22.14 and npm >= 11.5.1.
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: npm install --global npm@^11.5.1

      - name: Resolve the already-released first-parent baseline
        id: base
        run: |
          base_sha=$(git rev-parse "${RELEASE_SHA}^")
          echo "sha=$base_sha" >> "$GITHUB_OUTPUT"

      - name: Calculate next patch versions
        id: versions
        run: node nodejs/scripts/compute-release-versions.mjs
        env:
          # Main is protected by CI and normally advances by one merge/squash
          # commit, so its first parent is the exact already-released baseline.
          RELEASE_BASE_SHA: ${{ steps.base.outputs.sha }}

      - name: Publish next patch versions
        id: publish
        run: node nodejs/scripts/publish-versioned-packages.mjs
        env:
          RELEASE_PACKAGES: ${{ steps.versions.outputs.publishedPackages }}

      - name: Create GitHub Releases with downloadable tarballs
        if: steps.publish.outputs.published == 'true'
        run: node nodejs/scripts/create-github-releases.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.versions.outputs.publishedPackages }}
