name: Release

on:
  push:
    branches: [main]
  # Keeps the normal main-push release path intact while allowing a logged,
  # idempotent recovery run if GitHub ever drops a push event.
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Calculate next patch versions
        id: versions
        run: node scripts/compute-release-versions.mjs

      - name: Publish next patch versions
        id: publish
        run: node scripts/publish-versioned-packages.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Create GitHub Releases with downloadable tarballs
        if: steps.publish.outputs.published == 'true'
        run: node scripts/create-github-releases.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.versions.outputs.publishedPackages }}
